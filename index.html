<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados de Partido - Netlife</title>
    <style>
@font-face {
    font-family: 'SelectionNameFont';
    src: url('assets/fonts/Fontspring-DEMO-flexible-h1000w200.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
}

@font-face {
    font-family: 'ScoreFont';
    src: url('assets/fonts/Fontspring-DEMO-flexible-h1000w200.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

#loading-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.15);
    z-index: 9999;
    transition: opacity 0.3s ease;
    pointer-events: none;
    opacity: 0;
}

html, body {
    font-family: 'SelectionNameFont', sans-serif;
    background-color: #1a1a1a;
    color: #fff;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    margin: 0;
    padding: 0;
}

h1 {
    display: none;
    /* Ocultamos el título para que la plantilla tome toda la pantalla */
}


.bg-img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    min-width: 100%;
    min-height: 100%;
}

/* Default state: hide both templates */
.template-box {
    display: none;
    position: relative;
    overflow: hidden;
    background-color: #000;
    width: 100vw !important;
    height: 100vh !important;
}

/* Template sizing — controlled entirely by JS */
.template-box.active-template {
    display: block;
}

/* Layout tipo overlay */
.template-box.horizontal .scoreboard {
    position: relative;
    width: 100%;
    height: 100%;
    min-width: 100%;
    min-height: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
}

.template-box.horizontal .bg {
    width: 100%;
    height: 100%;
    object-position: center;
    display: block;
}

.template-box.horizontal .team-left {
    position: absolute;
    left: 74%;
    top: 14%;
    width: 15%;
    height: 60%;
    transform: translateX(-50%);
}

.template-box.horizontal .team-right {
    position: absolute;
    left: 88%;
    top: 14%;
    width: 15%;
    height: 60%;
    transform: translateX(-50%);
}

.template-box.horizontal .team-left .country,
.template-box.horizontal .team-right .country {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%) scale(1.4, 1.8);
    transform-origin: top center;
    width: 100%;
    text-align: center;
    font-size: clamp(1.5rem, 1.5vw, 2rem);
    font-weight: 800;
    color: white;
    font-family: 'SelectionNameFont', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.04em;
}

.template-box.horizontal .team-left .flag,
.template-box.horizontal .team-right .flag {
    position: absolute;
    top: 25%;
    left: 50%;
    transform: translateX(-50%);
    width: clamp(4.5rem, 5vw, 6rem);
    aspect-ratio: 1 / 1;
    height: auto;
    border-radius: 50%;
    object-fit: cover;
    display: block;
}

.template-box.horizontal .team-left .score,
.template-box.horizontal .team-right .score {
    position: absolute;
    top: 72%;
    left: 49%;
    transform: translateX(-50%) scale(1, 1.2);
    transform-origin: top center;
    font-size: clamp(4rem, 5vw, 6rem);
    font-weight: 800;
    color: white;
    line-height: 1;
    font-family: 'ScoreFont', sans-serif;
}

.template-box.horizontal .score-separator {
    position: absolute;
    left: 81%;
    top: 59%;
    transform: translateX(-50%) scale(2.75, 1.8);
    transform-origin: top center;
    font-size: clamp(2rem, 3vw, 4rem);
    font-weight: 800;
    color: white;
    line-height: 1;
    font-family: none !important;
}

/* Layout tipo overlay vertical */
.template-box.vertical .scoreboard {
    position: relative;
    width: 100%;
    height: 100%;
    min-width: 100%;
    min-height: 100%;
    aspect-ratio: 600 / 810;
    overflow: hidden;
    container-type: inline-size;
}

.template-box.vertical .bg {
    width: 100%;
    height: 100%;
    object-position: center;
    display: block;
}

.template-box.vertical .team-left,
.template-box.vertical .team-right {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    transform: none;
}

.template-box.vertical .country {
    position: absolute;
    transform: translateX(-50%) scale(1, 1.2);
    transform-origin: top center;
    width: 100%;
    text-align: center;
    font-size: 5.5cqw;
    font-weight: 800;
    color: white;
    font-family: 'SelectionNameFont', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.04em;
}

.template-box.vertical .flag {
    position: absolute;
    transform: translateX(-50%);
    width: 17cqw;
    height: 17cqw;
    border-radius: 50%;
    object-fit: cover;
    display: block;
}

.template-box.vertical .score {
    position: absolute;
    transform: translateX(-50%) scale(1, 1.5);
    transform-origin: top center;
    font-size: 13cqw;
    font-weight: 800;
    color: white;
    line-height: 1;
    font-family: 'ScoreFont', sans-serif;
}

.template-box.vertical .score-separator {
    position: absolute;
    left: 51%;
    top: 34%;
    transform: translateX(-50%) scale(2.75, 1.8);
    transform-origin: top center;
    font-size: 7cqw;
    font-weight: 800;
    color: white;
    line-height: 1;
    font-family: 'Times New Roman', Times, serif !important;
}

/* Posiciones especificas Team Left */
.template-box.vertical .team-left .flag {
    top: 31%;
    left: 23%;
}
.template-box.vertical .team-left .country {
    top: 44%;
    left: 23%;
}
.template-box.vertical .team-left .score {
    top: 32%;
    left: 39%;
}

/* Posiciones especificas Team Right */
.template-box.vertical .team-right .flag {
    top: 31%;
    left: 77%;
}
.template-box.vertical .team-right .country {
    top: 44%;
    left: 78%;
}
.template-box.vertical .team-right .score {
    top: 32%;
    left: 62%;
}

@keyframes showElements {
    from { opacity: 0; }
    to { opacity: 1; }
}

.team-left, .team-right, .score-separator {
    opacity: 0;
    animation: showElements 1.5s step-end forwards;
}
</style>
</head>
<body>
    <div id="loading-overlay"></div>
    <h1>Visualización de Resultados</h1>
    
    <div class="template-box horizontal" id="box-hor">
        <div class="scoreboard" id="scoreboard-hor" style="display: none;">
            <video src="assets/KFC - 768 x 320 - MARCADOR PACHO_4.mp4" class="bg" autoplay loop muted playsinline></video>

            <div class="team team-left">
                <div id="home-name-hor" class="country"></div>
                <img id="home-logo-hor" src="" class="flag" alt="Local">
                <div class="score">
                    <span id="home-score-hor">-</span>
                </div>
            </div>

            <div class="score-separator">-</div>

            <div class="team team-right">
                <div id="away-name-hor" class="country"></div>
                <img id="away-logo-hor" src="" class="flag" alt="Visitante">
                <div class="score">
                    <span id="away-score-hor">-</span>
                </div>
            </div>
        </div>
    </div>

    <div class="template-box vertical" id="box-ver">
        <div class="scoreboard" id="scoreboard-ver" style="display: none;">
            <video src="assets/KFC - 600 x 810 - MARCADOR PACHO.mp4" class="bg" autoplay loop muted playsinline></video>

            <div class="team team-left">
                <div id="home-name-ver" class="country"></div>
                <img id="home-logo-ver" src="" class="flag" alt="Local">
                <div class="score">
                    <span id="home-score-ver">-</span>
                </div>
            </div>

            <div class="score-separator">-</div>

            <div class="team team-right">
                <div id="away-name-ver" class="country"></div>
                <img id="away-logo-ver" src="" class="flag" alt="Visitante">
                <div class="score">
                    <span id="away-score-ver">-</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.appDataLoaded = false;
        let fontsLoadedFlag = false;

        document.fonts.ready.then(() => {
            fontsLoadedFlag = true;
            if (typeof window.checkAllLoaded === 'function') {
                window.checkAllLoaded();
            }
        });

        window.checkAllLoaded = function() {
            if (window.appDataLoaded && fontsLoadedFlag) {
                setTimeout(() => {
                    const loadingOverlay = document.getElementById('loading-overlay');
                    if (loadingOverlay) {
                        loadingOverlay.style.opacity = '0';
                        setTimeout(() => { loadingOverlay.style.display = 'none'; }, 300);
                    }
                }, 100);
            }
        };

        setTimeout(() => {
            const loadingOverlay = document.getElementById('loading-overlay');
            if (loadingOverlay && loadingOverlay.style.display !== 'none') {
                loadingOverlay.style.opacity = '0';
                setTimeout(() => { loadingOverlay.style.display = 'none'; }, 300);
            }
        }, 10000);

        // ─── ESCALADO DE PLANTILLA ───────────────────────────────
        const horBox = document.getElementById('box-hor');
        const verBox = document.getElementById('box-ver');

        function applyTemplate() {
            const W = window.innerWidth;
            const H = window.innerHeight;

            if (W > H) {
                // Horizontal
                const ratio = 768 / 320;
                let w = W;
                let h = w / ratio;
                if (h > H) { h = H; w = h * ratio; }

                horBox.classList.add('active-template');
                verBox.classList.remove('active-template');

                horBox.style.width = w + 'px';
                horBox.style.height = h + 'px';
            } else {
                // Vertical
                const ratio = 600 / 810;
                let h = H;
                let w = h * ratio;
                if (w > W) { w = W; h = w / ratio; }

                verBox.classList.add('active-template');
                horBox.classList.remove('active-template');

                verBox.style.width = w + 'px';
                verBox.style.height = h + 'px';
            }
        }

        applyTemplate();
        window.addEventListener('resize', applyTemplate);
    </script>
    <script>
class MatchDisplayManager {
    constructor(options = {}) {
        this.apiUrl = options.apiUrl || 'https://alacapipollamundialista.alacoohperu.pe/api/public';
        this.fixtureId = options.fixtureId || 9;
        
        this.hor = {
            scoreboard: document.getElementById('scoreboard-hor'),
            homeLogo: document.getElementById('home-logo-hor'),
            homeName: document.getElementById('home-name-hor'),
            homeScore: document.getElementById('home-score-hor'),
            awayLogo: document.getElementById('away-logo-hor'),
            awayName: document.getElementById('away-name-hor'),
            awayScore: document.getElementById('away-score-hor')
        };
        this.ver = {
            scoreboard: document.getElementById('scoreboard-ver'),
            homeLogo: document.getElementById('home-logo-ver'),
            homeName: document.getElementById('home-name-ver'),
            homeScore: document.getElementById('home-score-ver'),
            awayLogo: document.getElementById('away-logo-ver'),
            awayName: document.getElementById('away-name-ver'),
            awayScore: document.getElementById('away-score-ver')
        };

        this.currentHomeScore = 0;
        this.currentAwayScore = 0;
        this.pageLoadTime = Date.now();
        this.pollInterval = options.pollInterval || 10000; // 10 seconds default
        this.templateType = options.templateType || 1;
        this.applyTemplateType();
    }

    applyTemplateColors() {
        const root = document.documentElement;
        if (this.templateType === 2) {
            root.style.setProperty('--country-color', '#fff');
            root.style.setProperty('--score-color', '#fff');
        } else {
            root.style.setProperty('--country-color', '#000');
            root.style.setProperty('--score-color', '#000');
        }
    }

    applyTemplateType() {
        this.applyTemplateColors();
    }

    getShortName(name, isoCode) {
        // You can customize this if you want to use ISO codes instead of full names
        // return isoCode || name;
        return name;
    }

    async fetchInitialData() {
        try {
            const response = await fetch(`${this.apiUrl}/partidos?id=${this.fixtureId}`, { cache: "no-store" });
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            
            const data = await response.json();
            
            if (data && data.partidos && data.partidos.length > 0) {
                const partido = data.partidos[0];
                let local = partido.local;
                let visitante = partido.visitante;
                const marcador = partido.marcador;

                let nuevoHome = parseInt(marcador.local) || 0;
                let nuevoAway = parseInt(marcador.visitante) || 0;

                // Siempre mostrar a Ecuador primero (como local)
                if (visitante && (visitante.codigo_iso === 'ECU' || visitante.nombre.toUpperCase().includes('ECUADOR'))) {
                    const tempTeam = local;
                    local = visitante;
                    visitante = tempTeam;

                    const tempScore = nuevoHome;
                    nuevoHome = nuevoAway;
                    nuevoAway = tempScore;
                }

                const savedHomeStr = localStorage.getItem(`alac_home_${this.fixtureId}`);
                const savedAwayStr = localStorage.getItem(`alac_away_${this.fixtureId}`);
                const savedHome = savedHomeStr !== null ? parseInt(savedHomeStr) : null;
                const savedAway = savedAwayStr !== null ? parseInt(savedAwayStr) : null;

                let isHiddenGoal = false;

                if (savedHome !== null && savedAway !== null && (nuevoHome > savedHome || nuevoAway > savedAway)) {
                    isHiddenGoal = true;
                    this.currentHomeScore = savedHome;
                    this.currentAwayScore = savedAway;
                } else {
                    this.currentHomeScore = nuevoHome;
                    this.currentAwayScore = nuevoAway;
                }

                // Make scoreboard visible
                if (this.hor.scoreboard) this.hor.scoreboard.style.display = 'flex';
                if (this.ver.scoreboard) this.ver.scoreboard.style.display = 'flex';
                
                const homeLogoUrl = local.bandera_url || local.bandera || local.logo;
                const homeName = local.codigo_iso || local.nombre || local.nombre_equipo || 'Local';
                
                const awayLogoUrl = visitante.bandera_url || visitante.bandera || visitante.logo;
                const awayName = visitante.codigo_iso || visitante.nombre || visitante.nombre_equipo || 'Visitante';

                if (homeLogoUrl) {
                    if (this.hor.homeLogo) {
                        this.hor.homeLogo.src = homeLogoUrl;
                        this.hor.homeLogo.onerror = () => { this.hor.homeLogo.style.display = 'none'; };
                    }
                    if (this.ver.homeLogo) {
                        this.ver.homeLogo.src = homeLogoUrl;
                        this.ver.homeLogo.onerror = () => { this.ver.homeLogo.style.display = 'none'; };
                    }
                }
                if (this.hor.homeName) this.hor.homeName.innerText = homeName;
                if (this.ver.homeName) this.ver.homeName.innerText = homeName;
                if (this.hor.homeScore) this.hor.homeScore.innerText = this.currentHomeScore;
                if (this.ver.homeScore) this.ver.homeScore.innerText = this.currentHomeScore;
                
                if (awayLogoUrl) {
                    if (this.hor.awayLogo) {
                        this.hor.awayLogo.src = awayLogoUrl;
                        this.hor.awayLogo.onerror = () => { this.hor.awayLogo.style.display = 'none'; };
                    }
                    if (this.ver.awayLogo) {
                        this.ver.awayLogo.src = awayLogoUrl;
                        this.ver.awayLogo.onerror = () => { this.ver.awayLogo.style.display = 'none'; };
                    }
                }
                if (this.hor.awayName) this.hor.awayName.innerText = awayName;
                if (this.ver.awayName) this.ver.awayName.innerText = awayName;
                if (this.hor.awayScore) this.hor.awayScore.innerText = this.currentAwayScore;
                if (this.ver.awayScore) this.ver.awayScore.innerText = this.currentAwayScore;

                localStorage.setItem(`alac_home_${this.fixtureId}`, nuevoHome);
                localStorage.setItem(`alac_away_${this.fixtureId}`, nuevoAway);

                if (isHiddenGoal) {
                    const elapsed = Date.now() - this.pageLoadTime;
                    const isEcuador = this.checkEcuadorGoal(nuevoHome, savedHome, nuevoAway, savedAway, partido);
                    this.triggerGoalAnimation(nuevoHome, nuevoAway, elapsed, isEcuador);
                }
                
                this.startPolling();

                // --- PANTALLA NEGRA DE CARGA ---
                let homeImgLoaded = !homeLogoUrl;
                let awayImgLoaded = !awayLogoUrl;

                const finishDataLoad = () => {
                    if (homeImgLoaded && awayImgLoaded) {
                        window.appDataLoaded = true;
                        if (typeof window.checkAllLoaded === 'function') {
                            window.checkAllLoaded();
                        }
                    }
                };

                const checkImgLoad = (imgElement, setLoadedFlag) => {
                    if (!imgElement) {
                        setLoadedFlag();
                        return;
                    }
                    if (imgElement.complete) {
                        setLoadedFlag();
                    } else {
                        imgElement.onload = () => { setLoadedFlag(); finishDataLoad(); };
                        imgElement.onerror = () => { setLoadedFlag(); finishDataLoad(); };
                    }
                };

                if (homeLogoUrl) {
                    // Check horizontal image (vertical is usually the same URL so it will be cached/fast)
                    checkImgLoad(this.hor.homeLogo, () => { homeImgLoaded = true; });
                }
                if (awayLogoUrl) {
                    checkImgLoad(this.hor.awayLogo, () => { awayImgLoaded = true; });
                }
                finishDataLoad();

            } else {
                console.error("No se encontró el partido con fixture_id:", this.fixtureId);
                window.appDataLoaded = true;
                if (typeof window.checkAllLoaded === 'function') window.checkAllLoaded();
            }
        } catch (error) {
            console.error(`Error al consultar el partido inicial ${this.fixtureId}:`, error);
            window.appDataLoaded = true;
            if (typeof window.checkAllLoaded === 'function') window.checkAllLoaded();
        }
    }

    checkEcuadorGoal(nuevoHome, savedHome, nuevoAway, savedAway, partido) {
        // Example implementation, logic for Ecuador goals if needed
        return false; 
    }

    triggerGoalAnimation(nuevoHome, nuevoAway, elapsed, isEcuador) {
        // If a goal animation is triggered, update the scores after the animation
        console.log("¡GOL! Actualizando marcadores animadamente...");
        
        // Simulating the end of an animation by updating scores directly for now
        setTimeout(() => {
            this.updateScores(nuevoHome, nuevoAway);
        }, 3000);
    }

    updateScores(homeScore, awayScore) {
        this.currentHomeScore = homeScore;
        this.currentAwayScore = awayScore;

        if (this.hor.homeScore) this.hor.homeScore.innerText = this.currentHomeScore;
        if (this.hor.awayScore) this.hor.awayScore.innerText = this.currentAwayScore;
        if (this.ver.homeScore) this.ver.homeScore.innerText = this.currentHomeScore;
        if (this.ver.awayScore) this.ver.awayScore.innerText = this.currentAwayScore;
    }

    startPolling() {
        if (this.pollingIntervalId) clearInterval(this.pollingIntervalId);
        this.pollingIntervalId = setInterval(() => {
            this.fetchUpdateData();
        }, this.pollInterval);
    }

    async fetchUpdateData() {
        try {
            const response = await fetch(`${this.apiUrl}/partidos?id=${this.fixtureId}`, { cache: "no-store" });
            if (!response.ok) return;
            const data = await response.json();
            
            if (data && data.partidos && data.partidos.length > 0) {
                const partido = data.partidos[0];
                const marcador = partido.marcador;
                
                let nuevoHome = parseInt(marcador.local) || 0;
                let nuevoAway = parseInt(marcador.visitante) || 0;

                // Siempre mostrar a Ecuador primero (como local)
                const visitante = partido.visitante;
                if (visitante && (visitante.codigo_iso === 'ECU' || visitante.nombre.toUpperCase().includes('ECUADOR'))) {
                    const tempScore = nuevoHome;
                    nuevoHome = nuevoAway;
                    nuevoAway = tempScore;
                }

                if (nuevoHome > this.currentHomeScore || nuevoAway > this.currentAwayScore) {
                    const elapsed = Date.now() - this.pageLoadTime;
                    const isEcuador = this.checkEcuadorGoal(nuevoHome, this.currentHomeScore, nuevoAway, this.currentAwayScore, partido);
                    
                    localStorage.setItem(`alac_home_${this.fixtureId}`, nuevoHome);
                    localStorage.setItem(`alac_away_${this.fixtureId}`, nuevoAway);
                    
                    this.triggerGoalAnimation(nuevoHome, nuevoAway, elapsed, isEcuador);
                }
            }
        } catch (error) {
            console.error("Error en polling:", error);
        }
    }
}

// Inicializar la aplicación cuando el DOM esté listo
document.addEventListener('DOMContentLoaded', () => {
    // Obtener el ID de la URL si existe (ej. /?id=17)
    const urlParams = new URLSearchParams(window.location.search);
    const idFromUrl = urlParams.get('id');

    const typeFromUrl = urlParams.get('tipo');
    const templateType = typeFromUrl === '2' ? 2 : 1;

    const displayManager = new MatchDisplayManager({
        fixtureId: idFromUrl ? parseInt(idFromUrl) : 9, // Usa el ID de la URL, o 9 por defecto
        templateType
    });
    
    displayManager.fetchInitialData();
});

</script>
</body>
</html>
